name: Deploy dashboard

# Builds the static dashboard and publishes it to GitHub Pages.
# Triggers on every push to main (including the monitor's data commits),
# so the live page always reflects the latest committed data.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one live deploy at a time; let a newer one supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # GitHub Pages serves a project site at https://<user>.github.io/<repo>/
          # so the app must be built with that subpath as its base.
          # Repo: techniverse2026/up-time  ->  base "/up-time/".
          # If you move to a custom domain / Vercel / Netlify at the root,
          # set this to "/" instead.
          BASE_PATH: "/up-time/"
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
